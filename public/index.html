<!DOCTYPE html>
<html lang="zh-TW">
<body>
  <h2>📦 訂單整理</h2>

  <textarea id="input" placeholder="貼上訂單..." style="width:100%;height:120px;"></textarea>
  <br><br>

  <button onclick="parseOrder()">整理訂單</button>

  <pre id="output"></pre>

  <script>
    async function parseOrder() {
  const text = document.getElementById("input").value;
  const lines = text.split("\n");

  const res = await fetch("products.json");
  const prices = await res.json();

  let result = "";
  let total = 0;

  lines.forEach(line => {
    const match = line.match(/(.+)\s+(.+)\+(\d+)/);
    if (match) {
      const name = match[1];
      const item = match[2];
      const qty = parseInt(match[3]);

      const price = prices[item] || 0;
      const sum = price * qty;

      total += sum;

      result += `${name}｜${item} x${qty} = $${sum}\n`;
    }
  });

  result += "\n總金額：" + total;

  document.getElementById("output").innerText = result;
}
  </script>
</body>
</html>
