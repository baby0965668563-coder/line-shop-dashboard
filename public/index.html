<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單系統</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      background: #c8a97e;
      color: white;
      border: none;
      border-radius: 8px;
    }
    .result {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>📦 訂單整理</h2>

<textarea id="input" placeholder="貼上訂單..."></textarea>

<br>
<button onclick="parse()">整理訂單</button>

<div class="result" id="output"></div>

<script>
function parse() {
  let text = document.getElementById("input").value;
  let lines = text.split("\\n");

  let result = {};

  lines.forEach(line => {
    let match = line.match(/(.+?)\\s+(\\S+)\\+?(\\d+)/);
    if(match){
      let name = match[1];
      let item = match[2];
      let qty = parseInt(match[3]);

      if(!result[name]) result[name] = [];
      result[name].push(item + " x" + qty);
    }
  });

  let html = "";
  for(let name in result){
    html += "<b>" + name + "</b><br>";
    html += result[name].join("<br>") + "<br><br>";
  }

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
