<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>訂單系統</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

textarea {
  width: 100%;
  height: 120px;
  margin-bottom: 10px;
  border-radius: 10px;
  padding: 10px;
}

button {
  padding: 8px 12px;
  background: #c8a97e;
  color: white;
  border: none;
  border-radius: 8px;
  margin-right: 5px;
  margin-top: 5px;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
}

.status {
  margin-top: 5px;
  font-weight: bold;
}

.total {
  font-size: 20px;
  font-weight: bold;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>📦 訂單整理</h2>

<textarea id="input" placeholder="貼上訂單..."></textarea>

<br>
<button onclick="parseOrder()">整理訂單</button>

<!-- ⭐ 篩選按鈕 -->
<div>
  <button onclick="filterStatus('全部')">全部</button>
  <button onclick="filterStatus('待對帳')">待對帳</button>
  <button onclick="filterStatus('已結單')">已結單</button>
  <button onclick="filterStatus('已寄出')">已寄出</button>
</div>

<div id="orders"></div>
<div class="total" id="total"></div>

<script>
let allOrders = [];
let currentFilter = "全部";

async function parseOrder() {
  const res = await fetch("products.json");
  const prices = await res.json();

  const text = document.getElementById("input").value;
  const lines = text.split("\n");

  allOrders = [];
  let total = 0;

  lines.forEach(line => {
    const match = line.match(/(.+)\s+(.+)\+(\d+)/);
    if(match){
      const name = match[1];
      const item = match[2];
      const qty = parseInt(match[3]);

      const price = prices[item] || 0;
      const sum = price * qty;

      total += sum;

      allOrders.push({
        name, item, qty, sum, status: "待對帳"
      });
    }
  });

  renderOrders();
  document.getElementById("total").innerText = "總金額：" + total;
}

function renderOrders(){
  let html = "";

  allOrders.forEach((o, i) => {

    if(currentFilter !== "全部" && o.status !== currentFilter){
      return;
    }

    html += `
      <div class="card">
        <b>${o.name}</b><br>
        商品：${o.item}<br>
        數量：${o.qty}<br>
        金額：$${o.sum}<br>

        <div class="status">狀態：${o.status}</div>

        <button onclick="setStatus(${i}, '已結單')">已結單</button>
        <button onclick="setStatus(${i}, '已寄出')">已寄出</button>
      </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

function setStatus(index, status){
  allOrders[index].status = status;
  renderOrders();
}

function filterStatus(status){
  currentFilter = status;
  renderOrders();
}
</script>

</body>
</html>
