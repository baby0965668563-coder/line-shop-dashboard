<!DOCTYPE html>
<html lang="zh-TW">
<body>
  <h2>📦 訂單整理</h2>

  <textarea id="input" placeholder="貼上訂單..." style="width:100%;height:120px;"></textarea>
  <br><br>

  <button onclick="parseOrder()">整理訂單</button>

  <pre id="output"></pre>

  <script>
    function parseOrder() {
      const text = document.getElementById("input").value;
      const lines = text.split("\n");
      let result = "";

      lines.forEach(line => {
        const match = line.match(/(.+)\s+(.+)\+(\d+)/);
        if (match) {
          result += `${match[1]} 點了 ${match[2]} x${match[3]}\n`;
        }
      });

      document.getElementById("output").innerText = result || "沒有讀到訂單";
    }
  </script>
</body>
</html>
