<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂單系統</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

textarea {
  width: 100%;
  height: 120px;
  margin-bottom: 10px;
  border-radius: 10px;
  padding: 10px;
}

button {
  padding: 10px 20px;
  background: #c8a97e;
  color: white;
  border: none;
  border-radius: 10px;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
}

.total {
  font-size: 20px;
  font-weight: bold;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>📦 訂單整理</h2>

<textarea id="input" placeholder="貼上訂單..."></textarea>

<br>
<button onclick="parseOrder()">整理訂單</button>

<div id="orders"></div>
<div class="total" id="total"></div>

<script>
async function parseOrder() {

  const res = await fetch("products.json");
  const prices = await res.json();

  const text = document.getElementById("input").value;
  const lines = text.split("\n");

  let html = "";
  let total = 0;

  lines.forEach(line => {
    const match = line.match(/(.+)\s+(.+)\+(\d+)/);
    if(match){
      const name = match[1];
      const item = match[2];
      const qty = parseInt(match[3]);

      const price = prices[item] || 0;
      const sum = price * qty;

      total += sum;

      html += `
        <div class="card">
          <b>${name}</b><br>
          商品：${item}<br>
          數量：${qty}<br>
          金額：$${sum}<br>
          狀態：待對帳
        </div>
      `;
    }
  });

  document.getElementById("orders").innerHTML = html;
  document.getElementById("total").innerText = "總金額：" + total;
}
</script>

</body>
</html>
